replicaCount: 1

image:
  admin:
    repository: zest-llm-admin
    tag: latest
    pullPolicy: IfNotPresent
  demo:
    repository: zest-llm-demo
    tag: latest
    pullPolicy: IfNotPresent
  litellm:
    repository: ghcr.io/berriai/litellm
    tag: main-latest
    pullPolicy: IfNotPresent

service:
  admin:
    port: 8088
    type: ClusterIP
  demo:
    port: 8081
    type: ClusterIP
  litellm:
    port: 4000
    type: ClusterIP

ingress:
  enabled: false
  className: nginx
  host: zest-llm.local
  tls: false
  annotations: {}

mysql:
  host: mysql
  port: 3306
  database: zest_llm
  username: root
  # prefer existingSecret when set
  password: root
  existingSecret: ""
  secretPasswordKey: password

redis:
  host: valkey
  port: 6379

# Admin JWT / SSO（SSO 多副本须配 Redis，见 README）
admin:
  jwt:
    secret: change-me-in-production-zest-llm-admin-jwt-secret-key
    existingSecret: ""
    secretKey: secret
  sso:
    enabled: false
    provider: zest-sso
    issuer: http://localhost:9000
    discoveryUri: http://localhost:9000/api/public/.well-known/openid-configuration
    clientId: zest-llm-admin
    clientSecret: ""
    existingSecret: ""
    secretClientSecretKey: client-secret
    redirectUri: http://127.0.0.1:8088/login/callback
    postLogoutRedirectUri: http://127.0.0.1:8088/login

litellm:
  enabled: false
  baseUrl: http://litellm:4000
  openaiApiKey: mock-key

demo:
  enabled: true
  controlPlaneUrl: http://zest-llm-admin:8088

adapters:
  policyCache: valkey
  responseCache: valkey
  observability: noop

probes:
  admin:
    livenessPath: /swagger-ui.html
    readinessPath: /swagger-ui.html
  demo:
    livenessPath: /demo/order/methodA?orderId=1&question=ping
    readinessPath: /demo/order/methodA?orderId=1&question=ping

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 75

resources:
  admin: {}
  demo: {}
  litellm: {}
