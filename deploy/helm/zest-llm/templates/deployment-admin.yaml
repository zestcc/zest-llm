apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "zest-llm.fullname" . }}-admin
  labels:
    app.kubernetes.io/name: {{ include "zest-llm.name" . }}
    app.kubernetes.io/component: admin
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "zest-llm.name" . }}
      app.kubernetes.io/component: admin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "zest-llm.name" . }}
        app.kubernetes.io/component: admin
    spec:
      containers:
        - name: admin
          image: "{{ .Values.image.admin.repository }}:{{ .Values.image.admin.tag }}"
          imagePullPolicy: {{ .Values.image.admin.pullPolicy }}
          ports:
            - containerPort: 8088
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: docker
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://{{ .Values.mysql.host }}:{{ .Values.mysql.port }}/{{ .Values.mysql.database }}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai"
            - name: SPRING_DATASOURCE_USERNAME
              value: {{ .Values.mysql.username | quote }}
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-mysql" (include "zest-llm.fullname" .)) .Values.mysql.existingSecret }}
                  key: {{ .Values.mysql.secretPasswordKey | default "password" }}
            - name: SPRING_DATA_REDIS_HOST
              value: {{ .Values.redis.host | quote }}
            - name: SPRING_DATA_REDIS_PORT
              value: {{ .Values.redis.port | default 6379 | quote }}
            - name: ZEST_LLM_LITELLM_BASE_URL
              value: {{ .Values.litellm.baseUrl | quote }}
{{- include "zest-llm.admin.jwtEnv" . }}
{{- include "zest-llm.admin.ssoEnv" . }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.admin.livenessPath }}
              port: 8088
            initialDelaySeconds: 60
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.admin.readinessPath }}
              port: 8088
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources.admin | nindent 12 }}
