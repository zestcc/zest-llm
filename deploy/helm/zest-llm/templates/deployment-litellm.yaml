{{- if .Values.litellm.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "zest-llm.fullname" . }}-litellm
  labels:
    app.kubernetes.io/name: {{ include "zest-llm.name" . }}
    app.kubernetes.io/component: litellm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "zest-llm.name" . }}
      app.kubernetes.io/component: litellm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "zest-llm.name" . }}
        app.kubernetes.io/component: litellm
    spec:
      containers:
        - name: litellm
          image: "{{ .Values.image.litellm.repository }}:{{ .Values.image.litellm.tag }}"
          imagePullPolicy: {{ .Values.image.litellm.pullPolicy }}
          args: ["--port", "4000"]
          ports:
            - containerPort: 4000
          env:
            - name: OPENAI_API_KEY
              value: {{ .Values.litellm.openaiApiKey | quote }}
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources.litellm | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "zest-llm.fullname" . }}-litellm
  labels:
    app.kubernetes.io/name: {{ include "zest-llm.name" . }}
    app.kubernetes.io/component: litellm
spec:
  type: {{ .Values.service.litellm.type }}
  selector:
    app.kubernetes.io/name: {{ include "zest-llm.name" . }}
    app.kubernetes.io/component: litellm
  ports:
    - port: {{ .Values.service.litellm.port }}
      targetPort: 4000
      name: http
{{- end }}
