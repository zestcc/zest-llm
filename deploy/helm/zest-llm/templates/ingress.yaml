{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "zest-llm.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "zest-llm.name" . }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "zest-llm.fullname" . }}-admin
                port:
                  number: {{ .Values.service.admin.port }}
          {{- if .Values.demo.enabled }}
          - path: /demo
            pathType: Prefix
            backend:
              service:
                name: {{ include "zest-llm.fullname" . }}-demo
                port:
                  number: {{ .Values.service.demo.port }}
          {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ include "zest-llm.fullname" . }}-tls
  {{- end }}
{{- end }}
