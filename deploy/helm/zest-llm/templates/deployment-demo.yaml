{{- if .Values.demo.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "zest-llm.fullname" . }}-demo
  labels:
    app.kubernetes.io/name: {{ include "zest-llm.name" . }}
    app.kubernetes.io/component: demo
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "zest-llm.name" . }}
      app.kubernetes.io/component: demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "zest-llm.name" . }}
        app.kubernetes.io/component: demo
    spec:
      containers:
        - name: demo
          image: "{{ .Values.image.demo.repository }}:{{ .Values.image.demo.tag }}"
          imagePullPolicy: {{ .Values.image.demo.pullPolicy }}
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: docker
            - name: ZEST_LLM_CONTROL_PLANE_URL
              value: {{ .Values.demo.controlPlaneUrl | quote }}
            - name: ZEST_LLM_LITELLM_BASE_URL
              value: {{ .Values.litellm.baseUrl | quote }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.demo.livenessPath }}
              port: 8081
            initialDelaySeconds: 90
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.demo.readinessPath }}
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources.demo | nindent 12 }}
{{- end }}
