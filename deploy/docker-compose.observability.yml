# Langfuse 可观测性可选栈（与主 compose 叠加使用）
# 用法:
#   docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.observability.yml --profile observability up -d
# 启用 Admin Langfuse 适配器:
#   设置 admin 环境 SPRING_PROFILES_ACTIVE=docker,observability

services:
  langfuse-postgres:
    profiles: ["observability"]
    image: postgres:15-alpine
    container_name: zest-llm-langfuse-postgres
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 5s
      retries: 10

  langfuse:
    profiles: ["observability"]
    image: langfuse/langfuse:2
    container_name: zest-llm-langfuse
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-postgres:5432/langfuse
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: change-me-langfuse-nextauth-secret
      SALT: change-me-langfuse-salt
      TELEMETRY_ENABLED: "false"
      LANGFUSE_INIT_ORG_ID: zest-org
      LANGFUSE_INIT_PROJECT_NAME: zest-llm
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: pk-lf-zest-demo
      LANGFUSE_INIT_PROJECT_SECRET_KEY: sk-lf-zest-demo
    depends_on:
      langfuse-postgres:
        condition: service_healthy

volumes:
  langfuse_pg_data:
