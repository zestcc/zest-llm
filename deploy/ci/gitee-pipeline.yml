# Gitee Go 流水线（与 .gitee/pipelines/zestllm-ci.yml 同步）
# 文档：docs/Gitee-CI与生产签字.md

name: zestllm-ci

stages:
  - build
  - e2e-manual

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"

build-and-test:
  stage: build
  image: maven:3.9-eclipse-temurin-17
  cache:
    paths:
      - .m2/repository
  script:
    - mvn -B test
    - apt-get update -qq && apt-get install -y -qq curl
    - curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
    - apt-get install -y -qq nodejs
    - bash deploy/scripts/build-admin-ui.sh
    - git diff --exit-code zest-llm-admin/src/main/resources/static/ || (echo "UI static out of date" && exit 1)
  artifacts:
    paths:
      - "**/target/surefire-reports/"
    expire_in: 7 days

docker-e2e:
  stage: e2e-manual
  image: docker:24
  services:
    - docker:24-dind
  when: manual
  allow_failure: false
  script:
    - apk add --no-cache bash curl git openjdk17 maven
    - cd "$CI_PROJECT_DIR"
    - bash deploy/scripts/zest-stack-up.sh small
    - bash deploy/scripts/wait-stack-ready.sh
    # production-acceptance: 白盒 → e2e → sso-smoke → journeys → loadtest（含 GATE-SSO）
    - TIER=production SKIP_IT=1 bash deploy/scripts/production-acceptance.sh 2>&1 | tee deploy/test-reports/ci-docker-e2e.log
    - grep -E 'PASS GATE-SSO|SKIP GATE-SSO' deploy/test-reports/ci-docker-e2e.log
  artifacts:
    paths:
      - deploy/test-reports/
    expire_in: 14 days
  only:
    - main
    - master
    - develop
