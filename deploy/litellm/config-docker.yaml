# Docker / CI 默认：上游指向 openai-mock，无需真实 API Key
model_list:
  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_base: http://openai-mock:8080/v1
      api_key: mock-key

  - model_name: gpt-3.5-turbo
    litellm_params:
      model: openai/gpt-3.5-turbo
      api_base: http://openai-mock:8080/v1
      api_key: mock-key

  - model_name: deepseek-chat
    litellm_params:
      model: openai/gpt-4o-mini
      api_base: http://openai-mock:8080/v1
      api_key: mock-key

general_settings:
  master_key: sk-zest-llm-demo

litellm_settings:
  drop_params: true
  set_verbose: false
