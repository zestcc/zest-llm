services:
  mysql:
    image: mysql:8.0
    container_name: zest-llm-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: zest_llm
      MYSQL_USER: zest
      MYSQL_PASSWORD: zest123
    ports:
      - "3306:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  valkey:
    image: valkey/valkey:8-alpine
    container_name: zest-llm-valkey
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  openai-mock:
    image: wiremock/wiremock:3.3.1
    container_name: zest-llm-openai-mock
    volumes:
      - ./openai-mock/mappings:/home/wiremock/mappings:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/__admin/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: zest-llm-litellm
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    ports:
      - "4000:4000"
    volumes:
      - ./litellm/config-docker.yaml:/app/config.yaml:ro
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-mock-key}
    depends_on:
      valkey:
        condition: service_healthy
      openai-mock:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  admin:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.admin
    container_name: zest-llm-admin
    ports:
      - "8088:8088"
      - "20552:20552"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      ZEST_LLM_JWT_SECRET: ${ZEST_LLM_JWT_SECRET:-change-me-in-production-zest-llm-admin-jwt-secret-key}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
    depends_on:
      mysql:
        condition: service_healthy
      valkey:
        condition: service_healthy
      litellm:
        condition: service_healthy
      mcp-mock:
        condition: service_healthy
      alert-mock:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8088/swagger-ui.html >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 90s

  demo:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.demo
    container_name: zest-llm-demo
    ports:
      - "8081:8081"
      - "20551:20551"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      admin:
        condition: service_healthy
      litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- 'http://localhost:8081/demo/order/methodA?orderId=1&question=ping' >/dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 120s

  mcp-mock:
    image: wiremock/wiremock:3.3.1
    container_name: zest-llm-mcp-mock
    ports:
      - "9090:8080"
    volumes:
      - ./mcp-mock/mappings:/home/wiremock/mappings:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/__admin/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  alert-mock:
    image: wiremock/wiremock:3.3.1
    container_name: zest-llm-alert-mock
    volumes:
      - ./alert-mock/mappings:/home/wiremock/mappings:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/__admin/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  mysql_data:
