# Kafka Report 可选 profile：docker compose -f docker-compose.yml -f docker-compose.kafka.yml up -d
services:
  redpanda:
    image: redpandadata/redpanda:v24.2.4
    container_name: zest-llm-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  admin:
    environment:
      SPRING_PROFILES_ACTIVE: docker,kafka
      SPRING_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
    depends_on:
      redpanda:
        condition: service_healthy
