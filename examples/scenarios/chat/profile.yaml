# 智能对话场景 Profile（small 栈）

```yaml
apiVersion: zestllm/v1
runtimeMode: agent
providerRef: litellm-default
model:
  primary: gpt-4o-mini
generation:
  maxTokens: 1024
  temperature: 0.7
  timeoutMs: 30000
extensions:
  runtimeBackend:
    type: native
  knowledge:
    enabled: false
  learningLoop:
    enabled: false
```

应用：`POST /api/admin/scenario-templates/apply` 或 Admin → 场景模板。
