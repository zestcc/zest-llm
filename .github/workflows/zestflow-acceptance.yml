name: ZestLLM Acceptance

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Maven test
        run: mvn -B test
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: zest-llm-admin-ui/package-lock.json
      - name: Admin UI build and embed into static
        run: bash deploy/scripts/build-admin-ui.sh
      - name: Verify embedded static matches UI build
        run: |
          git diff --exit-code zest-llm-admin/src/main/resources/static/ \
            || (echo "UI static/ out of date — run deploy/scripts/build-admin-ui.sh and commit" && exit 1)

  docker-e2e:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'workflow_dispatch'
    env:
      DOCKER_HOST: tcp://localhost:2375
      DOCKER_TLS_CERTDIR: ""
    services:
      docker:
        image: docker:24-dind
        options: --privileged
        ports:
          - 2375:2375
    steps:
      - uses: actions/checkout@v4
      - name: Verify Docker
        run: docker info
      - name: Syntax check scripts
        run: |
          bash -n deploy/scripts/production-acceptance.sh
          bash -n deploy/scripts/e2e-zeststory-zestllm.sh
      - name: Validate large tier compose
        run: bash deploy/scripts/validate-large-tier-compose.sh
      - name: Start stack
        run: bash deploy/scripts/zest-stack-up.sh small
      - name: Wait for health
        run: bash deploy/scripts/wait-stack-ready.sh
      - name: ZestStory smoke (E2E-01/RAG-01)
        run: bash deploy/scripts/e2e-zeststory-zestllm.sh
      - name: Production sign-off (DOCKER-01)
        run: TIER=production SKIP_IT=1 bash deploy/scripts/production-acceptance.sh
