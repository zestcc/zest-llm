# ZestFlow 嵌入配置：仅 MySQL，禁止 H2
zestflow:
  executor:
    port: 20552
    app-name: zest-llm-admin
    # ZestLLM 合一部署：Executor 向本机 Admin（兼 ZestFlow Hub）自注册
    admin-addresses: ${ZESTFLOW_EXECUTOR_ADMIN_ADDRESSES:http://127.0.0.1:8088}
    execute-endpoint-enabled: true
    chain-route-enabled: true
    execute-response-mode: BODY
    execute-failure-policy: PROPAGATE
    chain:
      declaration-sync-enabled: true
    event:
      async-enabled: true
    ai:
      llm-enabled: false
    schedule:
      enabled: false
      driver: noop
    # 未配置 zestflow.executor.datasource 时复用 spring.datasource（MySQL）
  collector:
    async-enabled: false
    registry:
      admin-addresses: ${ZESTFLOW_COLLECTOR_ADMIN_ADDRESSES:http://127.0.0.1:8088}
