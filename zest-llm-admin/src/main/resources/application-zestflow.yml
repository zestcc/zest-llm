# ZestFlow 嵌入配置：仅 MySQL，禁止 H2
zestflow:
  executor:
    port: 20552
    app-name: zest-llm-admin
    # ZestLLM 合一部署，不向外部 ZestFlow Admin 注册
    admin-addresses: ""
    execute-endpoint-enabled: true
    chain-route-enabled: false
    execute-response-mode: BODY
    execute-failure-policy: PROPAGATE
    chain:
      declaration-sync-enabled: true
    event:
      async-enabled: true
    ai:
      llm-enabled: false
    schedule:
      enabled: false
      driver: noop
    # 未配置 zestflow.executor.datasource 时复用 spring.datasource（MySQL）
  collector:
    async-enabled: false
    registry:
      admin-addresses: ""
