server:
  port: 8088

spring:
  application:
    name: zest-llm-admin
  config:
    import:
      - classpath:application-zestflow.yml
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.h2.H2ConsoleAutoConfiguration
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: true
  # 数据源不在此文件配置，避免覆盖 application-local.yml：
  # 本地开发请使用 -Dspring-boot.run.profiles=local（读取 application-local.yml）
  # Docker 部署请使用 SPRING_PROFILES_ACTIVE=docker（读取 application-docker.yml）

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id

zest:
  stack:
    tier: ${ZEST_STACK_TIER:small}
  llm:
    adapters:
      model-gateway: litellm
      prompt-renderer: handlebars
      observability: noop
      policy-cache: caffeine
      quota: noop
      output-schema-validator: json
      audit: noop
      report-channel: sync
    plugins:
      external-dir: ${ZEST_LLM_PLUGIN_DIR:./deploy/plugins}
      scan-on-startup: true
    litellm:
      base-url: http://localhost:4000
      api-key: ${LITELLM_API_KEY:sk-zest-llm-demo}
      connect-timeout-ms: 5000
      read-timeout-ms: 60000
    # http-knowledge SPI: zest.llm.adapters.knowledge-retrieval=http-knowledge
    http-knowledge:
      base-url: http://localhost:8090
      retrieve-path: /v1/retrieve
      health-path: /health
    flow:
      enabled: true
      control-plane-url: http://localhost:8088
      app-key: order-service
      auth-token: demo-token-123
  sso:
    client:
      enabled: ${zest-llm.admin.sso.enabled:false}
      issuer: ${zest-llm.admin.sso.issuer:http://localhost:9000}
      client-id: ${zest-llm.admin.sso.client-id:zest-llm-admin}
      backchannel-logout-path: /api/admin/auth/sso/backchannel-logout
      frontchannel-logout-path: /auth/frontchannel-logout

zest-llm:
  admin:
    meta:
      app-version: 1.0.0
    integration:
      webhook-url: ${ZEST_INTEGRATION_WEBHOOK_URL:}
    jwt:
      secret: change-me-in-production-zest-llm-admin-jwt-secret-key
      expiration-ms: 86400000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    cn.zest.www.zestllm: INFO
