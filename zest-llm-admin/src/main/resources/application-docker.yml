spring:
  datasource:
    url: jdbc:mysql://mysql:3306/zest_llm?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: valkey
      port: 6379

zest:
  llm:
    litellm:
      base-url: http://litellm:4000
    flow:
      enabled: true
      control-plane-url: http://localhost:8088
      app-key: order-service
      auth-token: demo-token-123
    adapters:
      policy-cache: valkey
      response-cache: valkey
      quota: redis-token-bucket
      audit: jdbc
      observability: noop
      report-channel: sync
      content-moderation: keyword-blocklist
      alert-webhook: http
    langfuse:
      enabled: false

zest-llm:
  admin:
    execution-archive:
      enabled: true
      retention-days: 90
    agent-probe:
      schedule-enabled: true
      cron: "0 */30 * * * ?"
      smoke-test-on-schedule: false
      alert-webhook-url: http://alert-mock:8080/webhook
      alert-on-degraded: false
      alert-cooldown-minutes: 60
    jwt:
      secret: ${ZEST_LLM_JWT_SECRET:change-me-in-production-zest-llm-admin-jwt-secret-key}
