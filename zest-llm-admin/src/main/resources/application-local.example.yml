# Local dev — copy to application-local.yml
# 一键启动: powershell -File deploy/scripts/start-local-full.ps1 [-WithLiteLLM]
# 禁止 H2：仅使用 MySQL 8
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/zest_llm?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: 123456   # 改为你本机 MySQL root 密码
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration/zestllm

zest:
  llm:
    litellm:
      base-url: http://localhost:4000
      api-key: sk-zest-llm-demo
    adapters:
      quota: db
      policy-cache: caffeine
      response-cache: noop
    learning:
      auto-publish:
        enabled: false
  sso:
    client:
      enabled: false
      issuer: http://localhost:9000
      client-id: zest-llm-admin
      backchannel-logout-path: /api/admin/auth/sso/backchannel-logout
      frontchannel-logout-path: /auth/frontchannel-logout

zest-llm:
  admin:
    jwt:
      secret: local-dev-jwt-secret-key-at-least-32-chars
    sso:
      enabled: false
      provider: zest-sso
      display-name: ZestSSO
      issuer: http://localhost:9000
      discovery-uri: http://localhost:9000/api/public/.well-known/openid-configuration
      audience: zest-llm-admin
      jwks-uri: http://localhost:9000/oauth2/jwks
      client-id: zest-llm-admin
      client-secret: change-me-in-production
      redirect-uri: http://localhost:5174/login/callback
      post-logout-redirect-uri: http://localhost:5174/login
      scopes:
        - openid
        - profile
        - email
        - roles
        - tenant
      claims:
        username-claim: preferred_username
        roles-claim: roles
        admin-role: SSO_ADMIN
        operator-role: SSO_OPERATOR
        default-role: ADMIN
      zest-sso:
        use-logout-url-api: true
        logout-url-api-path: /api/public/logout-url
    oidc:
      enabled: false
    execution-archive:
      enabled: true
      retention-days: 90
    observability:
      langfuse-ui-base-url: http://localhost:3000
      trace-path-template: /trace/{traceId}
    agent-probe:
      schedule-enabled: false
      smoke-test-on-schedule: false
      alert-on-degraded: false
    learning-cycle:
      schedule-enabled: false
      dry-run-on-schedule: true

zestflow:
  executor:
    admin-addresses: http://127.0.0.1:8088
  collector:
    registry:
      admin-addresses: http://127.0.0.1:8088

logging:
  level:
    com.zestflow.executor.registry: INFO
