# Local dev — copy to application-local.yml
# 前置：cd deploy && docker compose up -d mysql
# 禁止 H2：仅使用 MySQL 8
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/zest_llm?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: 123456   # 改为你本机 MySQL root 密码
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration/zestllm

zest:
  llm:
    litellm:
      base-url: http://localhost:4000
    adapters:
      quota: db

zest-llm:
  admin:
    jwt:
      secret: local-dev-jwt-secret-key-at-least-32-chars
    execution-archive:
      enabled: true
      retention-days: 90
    observability:
      langfuse-ui-base-url: http://localhost:3000
      trace-path-template: /trace/{traceId}
    agent-probe:
      schedule-enabled: true
      cron: "0 */30 * * * ?"
      smoke-test-on-schedule: false
      alert-webhook-url:
      alert-on-degraded: false
      alert-cooldown-minutes: 60
