spring:
  flyway:
    enabled: true
    locations: classpath:db/migration/zestllm
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

zest:
  llm:
    adapters:
      quota: noop
      policy-cache: caffeine
      observability: noop
      audit: noop

zest-llm:
  admin:
    jwt:
      secret: it-test-jwt-secret-key-at-least-32-chars-long
